    <section>
      <article>
        <form action="#" method="post">
        <!-- elementos de entrada -->
        <input type="text" name="usuario" placeholder="Nombre de usuario">
        <input type="password" name="clave" placeholder="Contraseña">
        <input type="email" name="correo" placeholder="E-mail">
        <input type="number" name="edad" min="1" max="100" placeholder="Ponga su Edad">
        <input type="date" name="fecha_nacimiento>
        <input type="date" name="fecha_nacimiento" placeholder="Ingrese su Fecha de Nac.">
        <input type="file" name="documento" placeholder="Documento">
          <p>Género:</p>
            <label><input type="radio" name="genero" value="masculino"> Masculino</label>
            <label><input type="radio" name="genero" value="femenino"> Femenino</label>
            <label><input type="radio" name="genero" value="otro"> Otro</label>
          <p>Intereses:</p>
            <label><input type="checkbox" name="interes" value="musica"> Música</label>
            <label><input type="checkbox" name="interes" value="cine"> Cine</label>
            <label><input type="checkbox" name="interes" value="deporte"> Deporte</label>
          
            <select name="pais">
              <option value="ar">Argentina</option>
              <option value="co">Colombia</option>
              <option value="mx">México</option>
              <option value="pe">Peru</option>
            </select>
            <select name="cursos" multiple size="4">
              <option value="html">HTML</option>
              <option value="css">CSS</option>
              <option value="js">JavaScript</option>
              <option value="php">PHP</option>
            </select>
            <textarea name="comentarios" rows="4" cols="40" placeholder="Area de Texto"></textarea>
            <input type="submit" value="Enviar">
            <input type="reset" value="Borrar">
            <button type="button">Otro botón</button>

        </form>
      </article>
      <article>
        <form action="#" method="post">
